version: '3.8'

services:
  # 1. PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: smarterp-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smarterp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. FastAPI Backend Service
  backend:
    build: ./backend
    container_name: smarterp-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/smarterp
      - SECRET_KEY=smarterp_super_secret_key_change_me_in_production_12345
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - CHROMA_DB_PATH=/chroma_db
    volumes:
      - chromadb_data:/chroma_db
    depends_on:
      db:
        condition: service_healthy
    restart: always

  # 3. Nginx React Frontend Service
  frontend:
    build: ./frontend
    container_name: smarterp-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
  chromadb_data:
